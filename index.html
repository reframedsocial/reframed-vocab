<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Library — Reframed Social</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #005CB6;
    --blue-light: #E6EFF9;
    --blue-mid: #C2D8F0;
    --olive: #88994B;
    --olive-light: #F2F4E8;
    --pink: #F27FB2;
    --pink-light: #FDE8F2;
    --charcoal: #2D2D2D;
    --white: #FFFFFF;
    --gray: #F7F9FC;
    --border: #E0E8F4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--blue);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,92,182,0.15);
  }
  .brand-lockup { display: flex; flex-direction: column; }
  .brand-name { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65); letter-spacing: 0.1em; text-transform: uppercase; }
  .brand-title { font-size: 20px; font-weight: 600; color: white; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .word-count-badge {
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .streak-badge {
    background: var(--pink);
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    transition: transform 0.2s;
  }
  .streak-badge.pop { animation: pop 0.3s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }

  /* TABS */
  .tabs-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 2rem;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #999;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--charcoal); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* MAIN */
  main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
  .section { display: none; }
  .section.active { display: block; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: #999;
    font-size: 15px;
  }
  .loading-dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* WORD CARDS */
  .word-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .word-card-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1rem; }
  .word-title { font-size: 22px; font-weight: 600; color: var(--blue); }
  .word-pos {
    font-size: 11px; font-weight: 600;
    background: var(--olive-light); color: var(--olive);
    padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .word-def { font-size: 14px; line-height: 1.7; color: var(--charcoal); margin-bottom: 1rem; }
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--blue);
    margin-bottom: 6px; margin-top: 12px;
  }
  .examples-list { list-style: none; padding: 0; }
  .examples-list li {
    font-size: 13px; color: #555; line-height: 1.7;
    padding: 4px 0 4px 14px;
    border-left: 2px solid var(--blue-mid);
    margin-bottom: 6px;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
  .tag-syn { background: var(--blue-light); color: var(--blue); }
  .tag-confuse { background: var(--pink-light); color: #c0567a; }
  .hook {
    font-size: 13px; color: #666; font-style: italic;
    background: #FAFAFA;
    border-left: 3px solid var(--olive);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-top: 14px;
    line-height: 1.6;
  }

  /* FLASHCARDS */
  .fc-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; padding-top: 0.5rem; }
  .fc-nav { display: flex; align-items: center; gap: 12px; }
  .fc-nav-btn {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 18px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--charcoal); font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .fc-nav-btn:hover { border-color: var(--blue); color: var(--blue); }
  .fc-progress { font-size: 13px; color: #999; min-width: 60px; text-align: center; }
  .fc-card-outer {
    perspective: 1200px;
    width: 100%; max-width: 560px; height: 280px;
    cursor: pointer;
  }
  .fc-card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .fc-card-inner.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .fc-front { background: var(--blue); color: white; }
  .fc-back { background: var(--blue-light); color: var(--charcoal); transform: rotateY(180deg); }
  .fc-word-big { font-size: 32px; font-weight: 600; margin-bottom: 6px; }
  .fc-pos-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
  .fc-tap-hint { font-size: 12px; opacity: 0.5; margin-top: 1.5rem; }
  .fc-def-text { font-size: 15px; line-height: 1.65; margin-bottom: 12px; }
  .fc-hook-text { font-size: 13px; color: var(--olive); font-style: italic; line-height: 1.5; }
  .fc-actions { display: flex; gap: 10px; margin-top: 0.5rem; }
  .fc-btn {
    border: none; border-radius: 10px;
    padding: 10px 24px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .fc-again { background: #eee; color: #555; }
  .fc-again:hover { background: #e0e0e0; }
  .fc-gotit { background: var(--olive); color: white; }
  .fc-gotit:hover { background: #7a8a40; }

  /* QUIZ */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }
  .quiz-stats { display: flex; gap: 10px; margin-bottom: 1.25rem; }
  .stat-card {
    flex: 1; background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--blue); }
  .stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .score-bar-wrap { background: var(--blue-light); border-radius: 20px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
  .score-bar-fill { background: var(--blue); height: 100%; border-radius: 20px; transition: width 0.5s ease; }
  .quiz-q-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--olive); margin-bottom: 8px; }
  .quiz-word { font-size: 28px; font-weight: 600; color: var(--blue); margin-bottom: 1.5rem; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .quiz-opt {
    background: white; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    font-size: 14px; line-height: 1.5; cursor: pointer;
    text-align: left; font-family: 'DM Sans', sans-serif;
    color: var(--charcoal); transition: all 0.15s;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-light); }
  .quiz-opt.correct { border-color: var(--olive); background: var(--olive-light); color: var(--olive); font-weight: 500; }
  .quiz-opt.wrong { border-color: var(--pink); background: var(--pink-light); color: #b0446a; }
  .quiz-feedback { font-size: 14px; line-height: 1.6; min-height: 44px; color: var(--charcoal); margin-bottom: 0.75rem; }
  .quiz-next-btn {
    display: none; background: var(--blue); color: white;
    border: none; border-radius: 10px; padding: 11px 30px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: background 0.15s;
  }
  .quiz-next-btn:hover { background: #0050a0; }
  .quiz-next-btn.visible { display: inline-block; }

  /* ERROR */
  .error-msg {
    text-align: center; padding: 3rem 2rem;
    color: #c0567a; font-size: 14px; line-height: 1.7;
  }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1.25rem 1rem; }
    .tabs-bar { padding: 0 1rem; }
    .tab-btn { padding: 12px 14px; font-size: 13px; }
    .fc-card-outer { height: 240px; }
    .fc-word-big { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand-lockup">
    <span class="brand-name">Reframed Social</span>
    <span class="brand-title">Word Library</span>
  </div>
  <div class="header-right">
    <span class="word-count-badge" id="word-count-badge">Loading…</span>
    <span class="streak-badge" id="streak-badge">🔥 0 streak</span>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('library', this)">Library</button>
  <button class="tab-btn" onclick="showTab('flashcards', this)">Flashcards</button>
  <button class="tab-btn" onclick="showTab('quiz', this)">Quiz</button>
</div>

<main>
  <!-- LIBRARY -->
  <div class="section active" id="tab-library">
    <div class="loading" id="library-loading">Loading your words<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    <div id="word-cards"></div>
  </div>

  <!-- FLASHCARDS -->
  <div class="section" id="tab-flashcards">
    <div class="fc-wrap">
      <div class="fc-nav">
        <button class="fc-nav-btn" onclick="fcNav(-1)">← prev</button>
        <span class="fc-progress" id="fc-progress">— of —</span>
        <button class="fc-nav-btn" onclick="fcNav(1)">next →</button>
      </div>
      <div class="fc-card-outer" onclick="flipCard()">
        <div class="fc-card-inner" id="fc-card">
          <div class="fc-face fc-front">
            <div class="fc-word-big" id="fc-word">—</div>
            <div class="fc-pos-label" id="fc-pos"></div>
            <div class="fc-tap-hint">tap to reveal definition</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-def-text" id="fc-def"></div>
            <div class="fc-hook-text" id="fc-hook"></div>
          </div>
        </div>
      </div>
      <div class="fc-actions" id="fc-actions" style="display:none;">
        <button class="fc-btn fc-again" onclick="markCard(false)">Try again</button>
        <button class="fc-btn fc-gotit" onclick="markCard(true)">Got it ✓</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="section" id="tab-quiz">
    <div class="quiz-wrap">
      <div class="quiz-stats">
        <div class="stat-card"><div class="stat-num" id="q-score">0</div><div class="stat-label">Score</div></div>
        <div class="stat-card"><div class="stat-num" id="q-streak">0</div><div class="stat-label">Streak</div></div>
        <div class="stat-card"><div class="stat-num" id="q-best">0</div><div class="stat-label">Best</div></div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="score-fill" style="width:0%"></div></div>
      <div class="quiz-q-label">What does this word mean?</div>
      <div class="quiz-word" id="q-word">—</div>
      <div class="quiz-options" id="q-options"></div>
      <div class="quiz-feedback" id="q-feedback"></div>
      <button class="quiz-next-btn" id="q-next" onclick="nextQuestion()">Next word →</button>
    </div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT70g7eh-LU4Wfv7It-W1nOt5xn5nhda_pB-zYetA-IniKKjq7xdbuFAsFubtCG7H_yRjXpyEcXyKDL/pub?output=csv';

let words = [];
let fcIndex = 0, fcFlipped = false;
let qScore = 0, qStreak = 0, qBest = 0, qAnswered = false, qWord = null;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r['Word']);
}

function mapWord(r) {
  return {
    word: r['Word'],
    pos: r['Part of Speech'],
    def: r['Definition'],
    examples: (r['Examples'] || '').split('|').map(s => s.trim()).filter(Boolean),
    synonyms: (r['Synonyms'] || '').split(',').map(s => s.trim()).filter(Boolean),
    confuses: (r['Often Confused With'] || '').split(',').map(s => s.trim()).filter(Boolean),
    hook: r['Memory Hook']
  };
}

async function loadWords() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Failed to fetch');
    const text = await res.text();
    const rows = parseCSV(text);
    words = rows.map(mapWord);
    document.getElementById('library-loading').style.display = 'none';
    document.getElementById('word-count-badge').textContent = words.length + (words.length === 1 ? ' word' : ' words');
    renderLibrary();
    renderFC();
    nextQuestion();
  } catch (e) {
    document.getElementById('library-loading').innerHTML = '<div class="error-msg">Couldn\'t load your words. Make sure the Google Sheet is published to the web and try refreshing.</div>';
    document.getElementById('word-count-badge').textContent = 'Error';
  }
}

function renderLibrary() {
  document.getElementById('word-cards').innerHTML = words.map(w => `
    <div class="word-card">
      <div class="word-card-header">
        <span class="word-title">${w.word}</span>
        <span class="word-pos">${w.pos}</span>
      </div>
      <div class="word-def">${w.def}</div>
      <div class="section-label">Examples</div>
      <ul class="examples-list">${w.examples.map(e => `<li>${e}</li>`).join('')}</ul>
      <div class="section-label">Synonyms</div>
      <div class="tags">${w.synonyms.map(s => `<span class="tag tag-syn">${s}</span>`).join('')}</div>
      <div class="section-label">Often confused with</div>
      <div class="tags">${w.confuses.map(c => `<span class="tag tag-confuse">${c}</span>`).join('')}</div>
      <div class="hook">${w.hook}</div>
    </div>
  `).join('');
}

function renderFC() {
  if (!words.length) return;
  const w = words[fcIndex];
  document.getElementById('fc-word').textContent = w.word;
  document.getElementById('fc-pos').textContent = w.pos;
  document.getElementById('fc-def').textContent = w.def;
  document.getElementById('fc-hook').textContent = w.hook;
  document.getElementById('fc-progress').textContent = `${fcIndex + 1} of ${words.length}`;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('fc-actions').style.display = 'none';
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fc-card').classList.toggle('flipped', fcFlipped);
  document.getElementById('fc-actions').style.display = fcFlipped ? 'flex' : 'none';
}

function fcNav(dir) {
  fcIndex = (fcIndex + dir + words.length) % words.length;
  renderFC();
}

function markCard(got) {
  if (got) { qStreak++; if (qStreak > qBest) qBest = qStreak; updateBadge(); }
  else { qStreak = 0; updateBadge(); }
  fcNav(1);
}

function updateBadge() {
  const el = document.getElementById('streak-badge');
  el.textContent = '🔥 ' + qStreak + ' streak';
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  document.getElementById('q-streak').textContent = qStreak;
  document.getElementById('q-best').textContent = qBest;
}

function nextQuestion() {
  if (words.length < 2) return;
  qAnswered = false;
  document.getElementById('q-feedback').textContent = '';
  document.getElementById('q-next').classList.remove('visible');
  const idx = Math.floor(Math.random() * words.length);
  qWord = words[idx];
  document.getElementById('q-word').textContent = qWord.word;
  const others = words.filter((_, i) => i !== idx).sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [qWord, ...others].sort(() => Math.random() - 0.5);
  document.getElementById('q-options').innerHTML = opts.map(w => {
    const safe = w.word.replace(/'/g, "\\'");
    const def = w.def.length > 100 ? w.def.slice(0, 100) + '…' : w.def;
    return `<button class="quiz-opt" onclick="checkAnswer(this,'${safe}')">${def}</button>`;
  }).join('');
  document.getElementById('q-score').textContent = qScore;
  document.getElementById('q-streak').textContent = qStreak;
  document.getElementById('q-best').textContent = qBest;
  document.getElementById('score-fill').style.width = Math.min(100, qScore * 10) + '%';
}

function checkAnswer(btn, chosen) {
  if (qAnswered) return;
  qAnswered = true;
  const correct = chosen === qWord.word;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    const bChosen = b.getAttribute('onclick').includes(qWord.word.replace(/'/g, "\\'"));
    if (bChosen) b.classList.add('correct');
  });
  if (!correct) { btn.classList.remove('correct'); btn.classList.add('wrong'); }
  if (correct) {
    qScore++;
    qStreak++;
    if (qStreak > qBest) qBest = qStreak;
    document.getElementById('q-feedback').textContent = '✓ Correct! ' + qWord.hook;
    updateBadge();
  } else {
    qStreak = 0;
    document.getElementById('q-feedback').textContent = '✗ Not quite — ' + qWord.word + ': ' + qWord.def.slice(0, 90) + '…';
    updateBadge();
  }
  document.getElementById('q-score').textContent = qScore;
  document.getElementById('score-fill').style.width = Math.min(100, qScore * 10) + '%';
  document.getElementById('q-next').classList.add('visible');
}

function showTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'flashcards') renderFC();
  if (tab === 'quiz') nextQuestion();
}

loadWords();
</script>
</body>
</html>
